name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        type: choice
        options:
          - develop
          - qa
          - prod
      tag:
        description: 'Tag a deployar (ej: v1.2.0)'
        required: true

jobs:
  quality-check:
    name: 🔍 Calidad (Lint & Test)
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🔍 Lint & Test
        run: |
          yarn lint
          yarn test

  build-check:
    name: 🏗️ Build Verification
    needs: quality-check
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🏗️ Build
        run: yarn build

  deploy:
    name: 🚀 Deploy → ${{ github.event.inputs.environment }} (${{ github.event.inputs.tag }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout ${{ github.event.inputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set Variables
        id: vars
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          ENV="${{ github.event.inputs.environment }}"
          TAG="${{ github.event.inputs.tag }}"

          case "$ENV" in
            develop) ENV_TAG="dev" ;;
            qa)      ENV_TAG="qa"  ;;
            prod)    ENV_TAG="$TAG" ;;
          esac

          DOCKER_TAGS="ghcr.io/${REPO}:${ENV_TAG}"
          if [[ "$ENV" == "prod" ]]; then
            DOCKER_TAGS="${DOCKER_TAGS}"$'\n'"ghcr.io/${REPO}:latest"
          fi

          echo "env_tag=${ENV_TAG}" >> $GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCKER_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      - name: ✅ Summary
        run: |
          echo "✅ Imagen deployada a ${{ github.event.inputs.environment }} con tag: ${{ steps.vars.outputs.env_tag }}"
