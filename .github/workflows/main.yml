name: Main Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        type: choice
        options: [develop, qa, prod]
      tag:
        description: 'Tag a deployar'
        required: true

jobs:
  quality-check:
    name: 🔍 Calidad (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🔍 Lint & Test
        run: |
          yarn lint
          yarn test

  build-check:
    name: 🏗️ Build Verification
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🏗️ Build
        run: yarn build

  release-please:
    name: 🔖 Release Please
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

  # Job intermedio para definir qué vamos a deployar
  prepare-vars:
    name: 📋 Prepare Deployment Variables
    needs: build-check
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.select.outputs.env }}
      tag: ${{ steps.select.outputs.tag }}
    steps:
      - id: select
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            # Por defecto, si es un push a main, lo mandamos a 'develop' 
            # (Puedes cambiar esto según tu lógica)
            echo "env=develop" >> $GITHUB_OUTPUT
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: 🚀 Deploy → ${{ needs.prepare-vars.outputs.env }}
    needs: [build-check, prepare-vars]
    runs-on: ubuntu-latest
    # ESTO ACTIVA EL BOTÓN DE "REVIEW" EN GITHUB
    environment: ${{ needs.prepare-vars.outputs.env }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-vars.outputs.tag }}

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set Variables
        id: vars
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          ENV="${{ needs.prepare-vars.outputs.env }}"
          TAG="${{ needs.prepare-vars.outputs.tag }}"

          case "$ENV" in
            develop) ENV_TAG="dev" ;;
            qa)      ENV_TAG="qa"  ;;
            prod)    ENV_TAG="$TAG" ;;
          esac

          DOCKER_TAGS="ghcr.io/${REPO}:${ENV_TAG}"
          if [[ "$ENV" == "prod" ]]; then
            DOCKER_TAGS="${DOCKER_TAGS}"$'\n'"ghcr.io/${REPO}:latest"
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCKER_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}

      - name: ✅ Summary
        run: |
          echo "Imagen deployada a ${{ github.event.inputs.environment }} con tag: ${{ steps.vars.outputs.env_tag }}"
